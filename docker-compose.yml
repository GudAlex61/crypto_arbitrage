services:
  redis:
    image: redis:7-alpine
    container_name: arbitrage-bot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-your_redis_password}
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arbitrage-bot
    depends_on:
      - redis
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-your_redis_password}
      - TELEGRAM_ENABLED=${TELEGRAM_ENABLED:-false}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - MIN_NET_PROFIT_PCT=${MIN_NET_PROFIT_PCT:-0}
      - MAX_PRICE_AGE_MS=${MAX_PRICE_AGE_MS:-45000}
      - PRICE_UPDATE_INTERVAL=${PRICE_UPDATE_INTERVAL:-5000}
      - INITIAL_DELAY_MS=${INITIAL_DELAY_MS:-10000}
      - ENABLED_EXCHANGES=${ENABLED_EXCHANGES:-}
      - BLACKLIST=${BLACKLIST:-TST,NEIRO}
    restart: unless-stopped

volumes:
  redis_data:
